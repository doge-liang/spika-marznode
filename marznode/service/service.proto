syntax = "proto3";

package marznode;

message Empty {}

enum ConfigFormat {
  PLAIN = 0;
  JSON = 1;
  YAML = 2;
}

message Backend {
  string name = 1;
  optional string type = 2;
  optional string version = 3;
  repeated Inbound inbounds = 4;
}

message BackendsResponse {
  repeated Backend backends = 1;
}

message Inbound {
  string tag = 1;
  optional string config = 2;
}

message User {
  uint32 id = 1;
  string username = 2;
  string key = 3;
}

message Outbound {
  string protocol = 1;
  string address = 2;
  uint32 port = 3;
  optional string username = 4;
  optional string password = 5;
  repeated string inbound_tags = 6;
}

message NodeOutboundPolicy {
  uint32 id = 1;
  string name = 2;
  string protocol = 3;
  string address = 4;
  uint32 port = 5;
  optional string username = 6;
  optional string password = 7;
  repeated string inbound_tags = 8;
}

message UserData {
  User user = 1;
  repeated Inbound inbounds = 2;
  repeated Outbound outbounds = 3;
}

message UsersData {
  repeated UserData users_data = 1;
  repeated NodeOutboundPolicy node_outbound_policies = 2;
}

message UsersStats {
  message UserStats {
    uint32 uid = 1;
    uint64 usage = 2;
  }
  repeated UserStats users_stats = 1;
}

message LogLine {
  string line = 1;
}

message BackendConfig {
  string configuration = 1;
  ConfigFormat config_format = 2;
}

message BackendLogsRequest {
  string backend_name = 1;
  bool include_buffer = 2;
}

message RestartBackendRequest {
  string backend_name = 1;
  optional BackendConfig config = 2;
}

message BackendStats {
  bool running = 1;
}

message TrafficTotals {
  uint64 rx_bytes = 1;
  uint64 tx_bytes = 2;
}

message NodeTrafficStats {
  bool available = 1;
  uint64 rx_total = 2;
  uint64 tx_total = 3;
  double rx_rate = 4;
  double tx_rate = 5;
  TrafficTotals today = 6;
  TrafficTotals month = 7;
  TrafficTotals total = 8;
}

service MarzService {
  rpc SyncUsers(stream UserData) returns (Empty);
  rpc RepopulateUsers(UsersData) returns (Empty);
  rpc FetchBackends(Empty) returns (BackendsResponse);
  rpc FetchUsersStats(Empty) returns (UsersStats);
  rpc FetchBackendConfig(Backend) returns (BackendConfig);
  rpc RestartBackend(RestartBackendRequest) returns (Empty);
  rpc StreamBackendLogs(BackendLogsRequest) returns (stream LogLine);
  rpc GetBackendStats(Backend) returns (BackendStats);
  rpc FetchNodeTrafficStats(Empty) returns (NodeTrafficStats);
}
