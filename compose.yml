services:
  marznode:
    image: ghcr.io/doge-liang/spika-marznode:0.7.3
    restart: always
    network_mode: host
    command: [ "sh", "-c", "sleep 10 && python3 marznode.py" ]

    environment:
      SERVICE_ADDRESS: "0.0.0.0"
      AUTH_GENERATION_ALGORITHM: "plain"
      MARZNODE_STORAGE_TYPE: "sqlite"
      MARZNODE_DB_PATH: "/var/lib/marznode/marznode.db"
      XRAY_ENABLED: "True"
      XRAY_EXECUTABLE_PATH: "/usr/local/bin/xray"
      XRAY_ASSETS_PATH: "/usr/local/lib/xray"
      XRAY_CONFIG_PATH: "/var/lib/marznode/xray_config.json"
      SING_BOX_ENABLED: "True"
      MARZNODE_VERSION: "0.7.3"
      SING_BOX_EXECUTABLE_PATH: "/usr/local/bin/sing-box"
      HYSTERIA_EXECUTABLE_PATH: "/usr/local/bin/hysteria"
      SSL_CLIENT_CERT_FILE: "/var/lib/marznode/client.pem"
      SSL_KEY_FILE: "./server.key"
      SSL_CERT_FILE: "./server.cert"

    healthcheck:
      test: ["CMD", "python3", "-c", "import socket,os; socket.create_connection(('127.0.0.1', int(os.environ.get('SERVICE_PORT','53042'))), 3).close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    volumes:
      - /var/lib/marznode:/var/lib/marznode
