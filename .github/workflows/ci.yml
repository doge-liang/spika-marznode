name: CI
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: checkout panel proto
        uses: actions/checkout@v4
        with:
          repository: doge-liang/spika-marzban
          path: _panel

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: panel-node proto drift check
        run: diff -u _panel/app/marznode/marznode.proto marznode/service/service.proto

      - run: pip install -r requirements-dev.txt

      - name: smoke import marznode
        run: python -c "import marznode; print('ok')"

      - name: tests
        run: python -m pytest -q
