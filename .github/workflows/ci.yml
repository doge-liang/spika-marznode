name: CI
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PANEL_REPO_TOKEN: ${{ secrets.SPIKA_PANEL_REPO_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: checkout panel proto
        if: env.PANEL_REPO_TOKEN != ''
        uses: actions/checkout@v6
        with:
          repository: doge-liang/spika-marzban
          path: _panel
          token: ${{ env.PANEL_REPO_TOKEN }}

      - name: panel-node proto drift check skipped
        if: env.PANEL_REPO_TOKEN == ''
        run: echo "::notice title=Panel proto drift check skipped::Set SPIKA_PANEL_REPO_TOKEN with read access to doge-liang/spika-marzban to enable this check."

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: panel-node proto drift check
        if: env.PANEL_REPO_TOKEN != ''
        run: diff -u _panel/app/marznode/marznode.proto marznode/service/service.proto

      - run: pip install -r requirements-dev.txt

      - name: smoke import marznode
        run: python -c "import marznode; print('ok')"

      - name: tests
        run: python -m pytest -q
